<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HOD Attendance</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0A0A;--card:#111;--surface:#1A1A1A;--gold:#C8A645;--red:#E53935;--green:#43A047;--blue:#1E88E5;--text:#F5F5F5;--text-dim:#888;--border:#2A2A2A}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;overflow:hidden}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
.hdr{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:0 16px;position:relative}
.hdr-title{font-size:16px;font-weight:800;color:var(--gold)}
.hdr-back{position:absolute;left:12px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}
.screen{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.screen::-webkit-scrollbar{display:none}
.login-logo{text-align:center;padding:30px 0 20px}
.login-logo .icon{font-size:48px}
.login-logo h1{font-size:22px;font-weight:900;color:var(--gold);margin:8px 0 4px}
.login-logo p{font-size:12px;color:var(--text-dim)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:14px}
.login-card h2{font-size:15px;font-weight:700}
.login-card p.sub{font-size:12px;color:var(--text-dim);line-height:1.5}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:#555}
.btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold),#A08830);color:#000}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.camera-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:16px;overflow:hidden;border:2px solid var(--border)}
.camera-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.camera-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px;background:linear-gradient(transparent 60%,rgba(0,0,0,.7))}
.record-btn{width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:var(--red);cursor:pointer;position:relative;transition:all .3s}
.record-btn.recording{background:#fff;border-color:var(--red);animation:pulseRec 1s infinite}
@keyframes pulseRec{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.record-btn.recording::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;background:var(--red);border-radius:4px}
.countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:900;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);z-index:10;pointer-events:none}
.preview-video{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;border:2px solid var(--border);background:#000}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center}
.geo-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-top:8px}
.geo-inside{background:rgba(67,160,71,.1);border:1px solid rgba(67,160,71,.3);color:var(--green)}
.geo-outside{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);color:var(--red)}
.geo-pending{background:rgba(30,136,229,.1);border:1px solid rgba(30,136,229,.3);color:var(--blue)}
.clock-info{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.info-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.info-item .value{font-size:14px;font-weight:800;color:var(--gold)}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.history-item .h-info{flex:1}
.history-item .h-title{font-size:13px;font-weight:700}
.history-item .h-sub{font-size:11px;color:var(--text-dim)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-err{border-color:var(--red);background:rgba(229,57,53,.1);color:var(--red)}
.role-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-left:6px}
.role-manager{background:rgba(156,39,176,.2);color:#CE93D8}
.role-captain{background:rgba(30,136,229,.2);color:#64B5F6}
.role-runner{background:rgba(255,152,0,.2);color:#FFB74D}
.role-steward{background:rgba(76,175,80,.2);color:#81C784}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
var firebaseConfig={apiKey:"AIzaSyB6YfM1DyVq0NTEWXpMdbCYuWwr9cWwbt0",authDomain:"hod-tickets.firebaseapp.com",projectId:"hod-tickets",storageBucket:"hod-tickets.firebasestorage.app",messagingSenderId:"86190418978",appId:"1:86190418978:web:8b1eafc784c4986fd3ee7b"};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();
var storage=firebase.storage();

// HOD Location — TESTING LOCATION (Khushi's current position)
var HOD_LAT=12.977128028869629,HOD_LNG=77.49148559570312,HOD_RADIUS=200;

var state={screen:'phone',phone:'',pin:'',staff:null,videoBlob:null,videoUrl:null,location:null,distance:null,isInside:false,todayRecord:null};

function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='err'?' toast-err':'');setTimeout(function(){t.classList.remove('show')},4000)}
function getRoleBadge(r){var m={manager:'role-manager',captain:'role-captain',runner:'role-runner',steward:'role-steward'},l={manager:'Manager',captain:'Captain',runner:'Runner',steward:'Steward'};return'<span class="role-badge '+(m[r]||'')+'">'+(l[r]||r)+'</span>'}
function fmtTime(ts){if(!ts)return'--:--';var d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtDate(ts){if(!ts)return'--';var d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}
function getDist(lat1,lon1,lat2,lon2){var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))}
function checkGeo(lat,lng){var d=getDist(lat,lng,HOD_LAT,HOD_LNG);state.location={lat:lat,lng:lng};state.distance=d;state.isInside=d<=HOD_RADIUS;return{distance:d,inside:state.isInside}}

var appEl=document.getElementById('app');
function render(){switch(state.screen){case'phone':renderPhone();break;case'pin':renderPIN();break;case'record':renderRecord();break;case'preview':renderPreview();break;case'dashboard':renderDashboard()}}

function renderPhone(){
appEl.innerHTML='<div class="login-logo"><div class="icon">📍</div><h1>HOD Attendance</h1><p>Phone + PIN Login</p></div>'+
'<div class="login-card"><h2>👋 Enter Phone Number</h2><p class="sub">Enter your registered phone number to Login/Logout.</p>'+
'<div style="display:flex;gap:8px"><span style="display:flex;align-items:center;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:700;color:var(--text-dim)">🇮🇳 +91</span>'+
'<input type="tel" id="phoneInp" class="inp" placeholder="9876543210" maxlength="10" style="flex:1" onkeypress="if(event.key===\'Enter\')findStaff()"></div>'+
'<button class="btn btn-gold" id="btn" onclick="findStaff()">Continue</button></div>'+
'<div style="text-align:center;margin-top:16px;padding:0 20px"><p style="font-size:11px;color:var(--text-dim);line-height:1.6">🔒 Phone number verified against staff records.<br>📍 Location checked to ensure you\'re at HOD.<br>🎥 3-sec video captured for attendance record.</p></div>';
setTimeout(function(){document.getElementById('phoneInp')?.focus()},100)}

function renderPIN(){
appEl.innerHTML='<div class="hdr"><button class="hdr-back" onclick="state.screen=\'phone\';render()">←</button><span class="hdr-title">Enter PIN</span></div><div class="screen">'+
'<div class="status-card"><div style="font-size:40px;margin-bottom:8px">🔐</div><div class="status-title">Welcome, '+state.staff.name+'</div>'+getRoleBadge(state.staff.role)+'<div class="status-sub" style="margin-top:8px">+91 '+state.phone+'</div></div>'+
'<div class="login-card"><h2>Enter 4-Digit PIN</h2><p class="sub">Your PIN was set by your manager when you were registered.</p>'+
'<input type="password" id="pinInp" class="inp" placeholder="••••" maxlength="4" style="text-align:center;letter-spacing:8px;font-size:20px" onkeypress="if(event.key===\'Enter\')verifyPIN()">'+
'<button class="btn btn-gold" id="btn" onclick="verifyPIN()">✓ Login</button></div></div>';
setTimeout(function(){document.getElementById('pinInp')?.focus()},100)}

function renderRecord(){
var type=state.todayRecord?'Logout':'Login';
appEl.innerHTML='<div class="hdr"><button class="hdr-back" onclick="state.screen=\'dashboard\';render()">←</button><span class="hdr-title">'+type+'</span></div><div class="screen">'+
'<div class="status-card" style="padding:12px"><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px"><span style="font-size:16px;font-weight:800">'+state.staff.name+'</span>'+getRoleBadge(state.staff.role)+'</div><div id="geoStatus" class="geo-status geo-pending">📍 Checking location...</div></div>'+
'<div class="camera-wrap"><video id="camVideo" autoplay playsinline muted></video><div class="countdown" id="countdown" style="display:none"></div><div class="camera-overlay"><div style="font-size:11px;color:#fff;margin-bottom:8px;text-align:center">Tap red button to start 3-second recording</div><button class="record-btn" id="recBtn" onclick="startRecording()"></button></div></div>'+
'<p style="font-size:11px;color:var(--text-dim);text-align:center">A 3-second video will be recorded for attendance verification.</p></div>';
startCamera();checkLocation()}

function renderPreview(){
var type=state.todayRecord?'Logout':'Login';
appEl.innerHTML='<div class="hdr"><button class="hdr-back" onclick="state.screen=\'record\';render()">←</button><span class="hdr-title">Confirm '+type+'</span></div><div class="screen">'+
'<div class="status-card"><div style="font-size:40px;margin-bottom:8px">🎥</div><div class="status-title">'+state.staff.name+'</div>'+getRoleBadge(state.staff.role)+'</div>'+
'<video class="preview-video" id="prevVideo" src="'+state.videoUrl+'" controls autoplay muted playsinline></video>'+
'<div class="clock-info"><div class="info-item"><div class="label">Location</div><div class="value" style="font-size:13px">'+(state.isInside?'✅ Inside HOD':'❌ '+state.distance+'m away')+'</div></div>'+
'<div class="info-item"><div class="label">Distance</div><div class="value" style="font-size:13px">'+state.distance+'m</div></div>'+
'<div class="info-item"><div class="label">Time</div><div class="value" style="font-size:13px">'+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true})+'</div></div>'+
'<div class="info-item"><div class="label">Type</div><div class="value" style="font-size:13px">'+type+'</div></div></div>'+
'<button class="btn btn-gold" id="confirmBtn" onclick="confirmAttendance()">✓ Confirm '+type+'</button>'+
'<button class="btn btn-outline" onclick="retakeVideo()">🔄 Re-record Video</button></div>'}

function renderDashboard(){
var in_=state.todayRecord&&state.todayRecord.clockIn&&!state.todayRecord.clockOut;
appEl.innerHTML='<div class="hdr"><span class="hdr-title">My Attendance</span></div><div class="screen">'+
'<div class="status-card"><div style="font-size:20px;font-weight:900">'+state.staff.name+'</div>'+getRoleBadge(state.staff.role)+'<div style="font-size:13px;color:var(--text-dim);margin-top:4px">+91 '+state.staff.phone+'</div></div>'+
'<div class="status-card" style="border-color:'+(in_?'var(--green)':'var(--border)')+'"><div style="font-size:40px;margin-bottom:8px">'+(in_?'🟢':'⚪')+'</div><div class="status-title" style="color:'+(in_?'var(--green)':'var(--text-dim)')+'">'+(in_?'Currently Logged In':'Not Logged In')+'</div><div class="status-sub">'+(in_?'Started at '+fmtTime(state.todayRecord.clockIn):'Tap below to Login')+'</div></div>'+
(in_?'<div class="clock-info"><div class="info-item"><div class="label">Login Time</div><div class="value">'+fmtTime(state.todayRecord.clockIn)+'</div></div><div class="info-item"><div class="label">Duration</div><div class="value" id="dur">--</div></div></div>':'')+
'<button class="btn '+(in_?'btn-red':'btn-green')+'" onclick="'+(in_?'goToRecord':'goToRecord')+'()">'+(in_?'🔴 Logout':'🟢 Login Now')+'</button>'+
'<h3 style="font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:20px">📋 Recent History</h3><div id="historyList"><div class="spinner"></div></div></div>';
loadHistory();if(in_)updateDur()}

function findStaff(){var p=document.getElementById('phoneInp').value.replace(/\D/g,'');if(p.length!==10){showToast('Enter valid 10-digit phone number','err');return}var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Checking...';state.phone=p;db.collection('staff').where('phone','==',p).where('active','==',true).get().then(function(s){if(s.empty){btn.disabled=false;btn.textContent='Continue';showToast('Phone not registered. Contact manager.','err');return}var d=s.docs[0];state.staff={id:d.id,...d.data()};var t=new Date(),ts=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');return db.collection('attendance').doc(state.staff.id+'_'+ts).get().then(function(r){state.todayRecord=r.exists?r.data():null;state.screen='pin';render()})}).catch(function(e){btn.disabled=false;btn.textContent='Continue';showToast('Error: '+e.message,'err')})}

function verifyPIN(){var p=document.getElementById('pinInp').value;if(p.length!==4){showToast('Enter 4-digit PIN','err');return}var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Verifying...';if(state.staff.pin!==p){btn.disabled=false;btn.textContent='✓ Login';showToast('Wrong PIN. Try again.','err');document.getElementById('pinInp').value='';setTimeout(function(){document.getElementById('pinInp')?.focus()},100);return}showToast('✅ Welcome, '+state.staff.name);state.screen='dashboard';render()}

function goToRecord(){state.screen='record';render()}

var camStream=null,mediaRecorder=null,recordedChunks=[];
function startCamera(){navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true}).then(function(s){camStream=s;var v=document.getElementById('camVideo');v.srcObject=s;v.play()}).catch(function(){showToast('Camera access denied. Enable it in settings.','err')})}
function stopCamera(){if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}}

function startRecording(){var btn=document.getElementById('recBtn');var cd=document.getElementById('countdown');if(!camStream){showToast('Camera not ready','err');return}
recordedChunks=[];mediaRecorder=new MediaRecorder(camStream,{mimeType:'video/webm;codecs=vp9,opus'});
mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recordedChunks.push(e.data)};
mediaRecorder.onstop=function(){var blob=new Blob(recordedChunks,{type:'video/webm'});state.videoBlob=blob;state.videoUrl=URL.createObjectURL(blob);stopCamera();state.screen='preview';render()};
btn.classList.add('recording');btn.disabled=true;cd.style.display='block';
var count=3;cd.textContent=count;
var iv=setInterval(function(){count--;if(count>0){cd.textContent=count}else if(count===0){cd.textContent='🎥';mediaRecorder.start()}else{clearInterval(iv);cd.style.display='none';mediaRecorder.stop();btn.classList.remove('recording')}},1000)}

function checkLocation(){var g=document.getElementById('geoStatus');if(!g)return;if(!navigator.geolocation){g.className='geo-status geo-outside';g.textContent='❌ GPS not supported';return}g.textContent='📍 Getting location...';navigator.geolocation.getCurrentPosition(function(p){var r=checkGeo(p.coords.latitude,p.coords.longitude);if(r.inside){g.className='geo-status geo-inside';g.textContent='✅ Inside HOD ('+r.distance+'m)'}else{g.className='geo-status geo-outside';g.textContent='❌ '+r.distance+'m away. Must be within '+HOD_RADIUS+'m.';showToast('You are '+r.distance+'m away. Come closer.','err')}},function(){g.className='geo-status geo-outside';g.textContent='❌ Location denied. Enable GPS.';showToast('Enable location permission','err')},{enableHighAccuracy:true,timeout:10000,maximumAge:0})}

function retakeVideo(){state.videoBlob=null;state.videoUrl=null;state.screen='record';render()}

function confirmAttendance(){if(!state.isInside){showToast('❌ Must be within '+HOD_RADIUS+'m of HOD to Login/Logout','err');return}if(!state.videoBlob){showToast('Video recording required','err');return}var btn=document.getElementById('confirmBtn');btn.disabled=true;btn.textContent='Saving...';var now=new Date(),ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),docId=state.staff.id+'_'+ts,isOut=state.todayRecord&&state.todayRecord.clockIn;var vidRef=storage.ref('attendance/'+docId+'_'+Date.now()+'.webm');vidRef.put(state.videoBlob).then(function(s){return s.ref.getDownloadURL()}).then(function(url){if(isOut){return db.collection('attendance').doc(docId).update({clockOut:firebase.firestore.FieldValue.serverTimestamp(),clockOutLocation:state.location,clockOutDistance:state.distance,clockOutVideo:url,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}else{return db.collection('attendance').doc(docId).set({staffId:state.staff.id,staffName:state.staff.name,staffRole:state.staff.role,phone:state.staff.phone,date:ts,clockIn:firebase.firestore.FieldValue.serverTimestamp(),clockInLocation:state.location,clockInDistance:state.distance,clockInVideo:url,clockOut:null,clockOutLocation:null,clockOutVideo:null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}}).then(function(){showToast(isOut?'✅ Logged Out!':'✅ Logged In!');return db.collection('attendance').doc(docId).get()}).then(function(d){state.todayRecord=d.data();state.videoBlob=null;state.videoUrl=null;state.screen='dashboard';render()}).catch(function(e){btn.disabled=false;btn.textContent='✓ Confirm '+(isOut?'Logout':'Login');showToast('Error: '+e.message,'err')})}

function loadHistory(){if(!state.staff)return;db.collection('attendance').where('staffId','==',state.staff.id).get().then(function(s){var h='';if(s.empty){h='<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:12px">No records yet</div>'}else{var a=[];s.forEach(function(d){a.push(d.data())});a.sort(function(x,y){return(y.createdAt?.seconds||0)-(x.createdAt?.seconds||0)});a.slice(0,10).forEach(function(d){var c=d.clockIn&&d.clockOut,i=c?'✅':d.clockIn?'🟢':'⚪',t=c?'Completed':d.clockIn?'In Progress':'Unknown',sub=d.clockIn?'In: '+fmtTime(d.clockIn):'';if(d.clockOut)sub+=' · Out: '+fmtTime(d.clockOut);h+='<div class="history-item"><span style="font-size:20px">'+i+'</span><div class="h-info"><div class="h-title">'+t+'</div><div class="h-sub">'+fmtDate(d.createdAt)+' · '+sub+'</div></div></div>'})}document.getElementById('historyList').innerHTML=h}).catch(function(){document.getElementById('historyList').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:12px">Could not load</div>'})}

function updateDur(){if(!state.todayRecord||!state.todayRecord.clockIn)return;var e=document.getElementById('dur');if(!e)return;var s=state.todayRecord.clockIn.toDate?state.todayRecord.clockIn.toDate():new Date(state.todayRecord.clockIn),m=Math.floor((Date.now()-s)/60000);e.textContent=Math.floor(m/60)+'h '+(m%60)+'m'}
setInterval(updateDur,60000);

render();
console.log('✅ HOD Attendance v2 loaded — Login/Logout + 3-sec video');
console.log('📍 Location: TESTING ('+HOD_LAT+','+HOD_LNG+') radius:'+HOD_RADIUS+'m');
</script>
</body>
</html>
