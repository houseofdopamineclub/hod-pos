<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HOD Attendance</title>

<!-- Firebase SDK v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0A0A;--card:#111;--surface:#1A1A1A;--elevated:#222;
  --gold:#C8A645;--gold2:#F2C744;--red:#E53935;--green:#43A047;
  --blue:#1E88E5;--text:#F5F5F5;--text-dim:#888;--border:#2A2A2A;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;overflow:hidden;}

.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;}

/* HEADER */
.hdr{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:0 16px;position:relative;}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:.5px;color:var(--gold);}
.hdr-back{position:absolute;left:12px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px;}

/* SCREEN */
.screen{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.screen::-webkit-scrollbar{display:none;}

/* LOGIN SCREEN */
.login-logo{text-align:center;padding:30px 0 20px;}
.login-logo .icon{font-size:48px;}
.login-logo h1{font-size:22px;font-weight:900;color:var(--gold);margin:8px 0 4px;}
.login-logo p{font-size:12px;color:var(--text-dim);}

.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:14px;}
.login-card h2{font-size:15px;font-weight:700;margin-bottom:4px;}
.login-card p.sub{font-size:12px;color:var(--text-dim);line-height:1.5;}

.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:#555;}

.btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:800;border:none;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#A08830);color:#000;}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,166,69,.3);}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
.btn-sm{padding:10px 16px;font-size:13px;width:auto;}

/* OTP INPUTS */
.otp-row{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.otp-inp{width:48px;height:52px;text-align:center;font-size:22px;font-weight:800;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border-color .2s;}
.otp-inp:focus{border-color:var(--gold);}

/* CAMERA */
.camera-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:16px;overflow:hidden;border:2px solid var(--border);}
.camera-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.camera-wrap .cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);}
.camera-wrap .cam-placeholder .icon{font-size:48px;}
.camera-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px;background:linear-gradient(transparent 60%,rgba(0,0,0,.7));}
.capture-btn{width:64px;height:64px;border-radius:50%;border:4px solid #fff;background:var(--red);cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.4);}
.capture-btn:hover{transform:scale(1.05);}
.capture-btn:active{transform:scale(.95);}

/* PREVIEW */
.preview-img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;border:2px solid var(--border);}

/* STATUS */
.status-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;}
.status-card .status-icon{font-size:40px;margin-bottom:8px;}
.status-card .status-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.status-card .status-sub{font-size:13px;color:var(--text-dim);line-height:1.5;}

/* GEO STATUS */
.geo-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;margin-top:8px;}
.geo-inside{background:rgba(67,160,71,.1);border:1px solid rgba(67,160,71,.3);color:var(--green);}
.geo-outside{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);color:var(--red);}
.geo-pending{background:rgba(30,136,229,.1);border:1px solid rgba(30,136,229,.3);color:var(--blue);}

/* CLOCK INFO */
.clock-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.info-item .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.info-item .value{font-size:16px;font-weight:800;color:var(--gold);}

/* HISTORY */
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.history-item .h-icon{font-size:20px;}
.history-item .h-info{flex:1;}
.history-item .h-title{font-size:13px;font-weight:700;}
.history-item .h-sub{font-size:11px;color:var(--text-dim);}
.history-item .h-time{font-size:12px;font-weight:700;color:var(--gold);}

/* LOADING */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s;max-width:90%;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-err{border-color:var(--red);background:rgba(229,57,53,.1);color:var(--red);}

/* ROLE BADGE */
.role-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-left:6px;}
.role-manager{background:rgba(156,39,176,.2);color:#CE93D8;}
.role-captain{background:rgba(30,136,229,.2);color:#64B5F6;}
.role-runner{background:rgba(255,152,0,.2);color:#FFB74D;}
.role-steward{background:rgba(76,175,80,.2);color:#81C784;}

/* RESPONSIVE */
@media(max-width:400px){
  .otp-inp{width:42px;height:46px;font-size:20px;}
  .hdr-title{font-size:14px;}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// HOD ATTENDANCE MODULE — OTP + Geofence + Selfie
// ═══════════════════════════════════════════════════════════

// ═══ Firebase Config ═══
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyB6YfM1DyVq0NTEWXpMdbCYuWwr9cWwbt0",
  authDomain: "hod-tickets.firebaseapp.com",
  projectId: "hod-tickets",
  storageBucket: "hod-tickets.firebasestorage.app",
  messagingSenderId: "86190418978",
  appId: "1:86190418978:web:8b1eafc784c4986fd3ee7b"
};

// ═══ HOD Location (Koramangala) ═══
var HOD_LAT = 12.9279;
var HOD_LNG = 77.6216;
var HOD_RADIUS_METERS = 100; // 100 meters

// ═══ State ═══
var app = firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();
var db = firebase.firestore();
var storage = firebase.storage();

var state = {
  screen: 'login',       // login | otp | selfie | preview | dashboard
  phone: '',
  staff: null,           // { id, name, phone, role, active }
  selfieBlob: null,
  selfieDataUrl: null,
  location: null,
  distance: null,
  isInside: false,
  todayRecord: null,     // today's attendance record if exists
  confirmationCode: null // OTP confirmation result
};

// ═══════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'err' ? ' toast-err' : '');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function getRoleBadge(role) {
  var map = { manager:'role-manager', captain:'role-captain', runner:'role-runner', steward:'role-steward' };
  var labels = { manager:'Manager', captain:'Captain', runner:'Runner', steward:'Steward' };
  return '<span class="role-badge ' + (map[role]||'') + '">' + (labels[role]||role) + '</span>';
}

function formatTime(ts) {
  if (!ts) return '--:--';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

function formatDate(ts) {
  if (!ts) return '--';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}

// ═══ Haversine Distance ═══
function getDistanceFromLatLon(lat1, lon1, lat2, lon2) {
  var R = 6371000; // Earth radius in meters
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
          Math.sin(dLon/2) * Math.sin(dLon/2);
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

// ═══ Check Geofence ═══
function checkGeofence(lat, lng) {
  var dist = getDistanceFromLatLon(lat, lng, HOD_LAT, HOD_LNG);
  state.location = { lat: lat, lng: lng };
  state.distance = dist;
  state.isInside = dist <= HOD_RADIUS_METERS;
  return { distance: dist, isInside: state.isInside };
}

// ═══════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════

var appEl = document.getElementById('app');

function render() {
  switch(state.screen) {
    case 'login': renderLogin(); break;
    case 'otp': renderOTP(); break;
    case 'selfie': renderSelfie(); break;
    case 'preview': renderPreview(); break;
    case 'dashboard': renderDashboard(); break;
    default: renderLogin();
  }
}

// ═══ LOGIN SCREEN ═══
function renderLogin() {
  var html = ''
    + '<div class="login-logo">'
    +   '<div class="icon">📍</div>'
    +   '<h1>HOD Attendance</h1>'
    +   '<p>Clock in with OTP + Location + Selfie</p>'
    + '</div>'
    + '<div class="login-card">'
    +   '<h2>👋 Enter Phone Number</h2>'
    +   '<p class="sub">We\'ll send an OTP to verify your identity. Make sure you\'re at HOD premises.</p>'
    +   '<div style="display:flex;gap:8px;">'
    +     '<span style="display:flex;align-items:center;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:700;color:var(--text-dim);">🇮🇳 +91</span>'
    +     '<input type="tel" id="phoneInp" class="inp" placeholder="9876543210" maxlength="10" style="flex:1;" onkeypress="if(event.key===\'Enter\')sendOTP()">'
    +   '</div>'
    +   '<div id="recaptcha-container"></div>'
    +   '<button class="btn btn-gold" id="sendOtpBtn" onclick="sendOTP()">📲 Send OTP</button>'
    + '</div>'
    + '<div style="text-align:center;margin-top:16px;padding:0 20px;">'
    +   '<p style="font-size:11px;color:var(--text-dim);line-height:1.6;">'
    +     '🔒 Your phone number is only used for attendance verification.<br>'
    +     '📍 Location is checked to ensure you\'re at HOD premises.<br>'
    +     '📸 Selfie is captured for attendance record.'
    +   '</p>'
    + '</div>';
  appEl.innerHTML = html;
  setupRecaptcha();
  setTimeout(function(){ document.getElementById('phoneInp')?.focus(); }, 100);
}

// ═══ OTP SCREEN ═══
function renderOTP() {
  var html = ''
    + '<div class="hdr"><button class="hdr-back" onclick="goBack(\'login\')">←</button><span class="hdr-title">Verify OTP</span></div>'
    + '<div class="screen">'
    +   '<div class="status-card">'
    +     '<div class="status-icon">📱</div>'
    +     '<div class="status-title">Enter OTP</div>'
    +     '<div class="status-sub">We sent a 6-digit code to<br><b>+91 ' + state.phone + '</b></div>'
    +   '</div>'
    +   '<div class="login-card">'
    +     '<div class="otp-row">'
    +       '<input class="otp-inp" id="o1" maxlength="1" oninput="otpInput(this,1)" onkeydown="otpKey(event,1)">'
    +       '<input class="otp-inp" id="o2" maxlength="1" oninput="otpInput(this,2)" onkeydown="otpKey(event,2)">'
    +       '<input class="otp-inp" id="o3" maxlength="1" oninput="otpInput(this,3)" onkeydown="otpKey(event,3)">'
    +       '<input class="otp-inp" id="o4" maxlength="1" oninput="otpInput(this,4)" onkeydown="otpKey(event,4)">'
    +       '<input class="otp-inp" id="o5" maxlength="1" oninput="otpInput(this,5)" onkeydown="otpKey(event,5)">'
    +       '<input class="otp-inp" id="o6" maxlength="1" oninput="otpInput(this,6)" onkeydown="otpKey(event,6)">'
    +     '</div>'
    +     '<button class="btn btn-gold" id="verifyBtn" onclick="verifyOTP()">✓ Verify & Continue</button>'
    +     '<button class="btn btn-outline btn-sm" style="margin-top:8px;align-self:center;" onclick="resendOTP()">🔄 Resend OTP</button>'
    +   '</div>'
    + '</div>';
  appEl.innerHTML = html;
  setTimeout(function(){ document.getElementById('o1')?.focus(); }, 100);
}

// ═══ SELFIE SCREEN ═══
function renderSelfie() {
  var clockType = state.todayRecord ? 'Clock Out' : 'Clock In';
  var html = ''
    + '<div class="hdr"><button class="hdr-back" onclick="goBack(\'otp\')">←</button><span class="hdr-title">' + clockType + ' — Selfie</span></div>'
    + '<div class="screen">'
    +   '<div class="status-card" style="padding:12px;">'
    +     '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;">'
    +       '<span style="font-size:16px;font-weight:800;">' + state.staff.name + '</span>' + getRoleBadge(state.staff.role)
    +     '</div>'
    +     '<div id="geoStatus" class="geo-status geo-pending">📍 Checking location...</div>'
    +   '</div>'
    +   '<div class="camera-wrap" id="camWrap">'
    +     '<video id="camVideo" autoplay playsinline muted></video>'
    +     '<div class="cam-placeholder" id="camPlaceholder" style="display:none;">'
    +       '<span class="icon">📷</span>'
    +       '<span style="font-size:12px;">Camera not available</span>'
    +     '</div>'
    +     '<div class="camera-overlay">'
    +       '<div style="font-size:11px;color:#fff;margin-bottom:8px;text-shadow:0 1px 4px rgba(0,0,0,.8);">Position your face in the frame</div>'
    +       '<button class="capture-btn" id="capBtn" onclick="captureSelfie()"></button>'
    +     '</div>'
    +   '</div>'
    +   '<p style="font-size:11px;color:var(--text-dim);text-align:center;">Tap the red button to capture. Your selfie is stored securely for attendance records only.</p>'
    + '</div>';
  appEl.innerHTML = html;
  startCamera();
  checkLocation();
}

// ═══ PREVIEW SCREEN ═══
function renderPreview() {
  var clockType = state.todayRecord ? 'Clock Out' : 'Clock In';
  var html = ''
    + '<div class="hdr"><button class="hdr-back" onclick="goBack(\'selfie\')">←</button><span class="hdr-title">Confirm ' + clockType + '</span></div>'
    + '<div class="screen">'
    +   '<div class="status-card">'
    +     '<div class="status-icon">📸</div>'
    +     '<div class="status-title">Preview Selfie</div>'
    +     '<div class="status-sub">' + state.staff.name + ' ' + getRoleBadge(state.staff.role) + '</div>'
    +   '</div>'
    +   '<img class="preview-img" id="previewImg" src="' + state.selfieDataUrl + '">'
    +   '<div class="clock-info">'
    +     '<div class="info-item"><div class="label">Location</div><div class="value" style="font-size:13px;">' + (state.isInside ? '✅ Inside HOD' : '❌ ' + state.distance + 'm away') + '</div></div>'
    +     '<div class="info-item"><div class="label">Distance</div><div class="value" style="font-size:13px;">' + state.distance + ' meters</div></div>'
    +     '<div class="info-item"><div class="label">Time</div><div class="value" style="font-size:13px;">' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}) + '</div></div>'
    +     '<div class="info-item"><div class="label">Type</div><div class="value" style="font-size:13px;">' + clockType + '</div></div>'
    +   '</div>'
    +   '<button class="btn btn-gold" id="confirmBtn" onclick="confirmAttendance()">✓ Confirm ' + clockType + '</button>'
    +   '<button class="btn btn-outline" onclick="retakeSelfie()">🔄 Retake Selfie</button>'
    + '</div>';
  appEl.innerHTML = html;
}

// ═══ DASHBOARD SCREEN ═══
function renderDashboard() {
  var isClockedIn = state.todayRecord && state.todayRecord.clockIn && !state.todayRecord.clockOut;
  var html = ''
    + '<div class="hdr"><span class="hdr-title">My Attendance</span></div>'
    + '<div class="screen">'
    +   '<div class="status-card">'
    +     '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;">'
    +       '<span style="font-size:20px;font-weight:900;">' + state.staff.name + '</span>' + getRoleBadge(state.staff.role)
    +     '</div>'
    +     '<div style="font-size:13px;color:var(--text-dim);">+91 ' + state.staff.phone + '</div>'
    +   '</div>';

  // Today's status
  html += '<div class="status-card" style="border-color:' + (isClockedIn ? 'var(--green)' : 'var(--gold)') + ';">'
    +   '<div class="status-icon">' + (isClockedIn ? '🟢' : '⚪') + '</div>'
    +   '<div class="status-title" style="color:' + (isClockedIn ? 'var(--green)' : 'var(--text-dim)') + ';">' + (isClockedIn ? 'Currently Clocked In' : 'Not Clocked In') + '</div>'
    +   '<div class="status-sub">' + (isClockedIn ? 'Started at ' + formatTime(state.todayRecord.clockIn) : 'Tap below to clock in') + '</div>'
    + '</div>';

  // Clock info if clocked in
  if (isClockedIn) {
    html += '<div class="clock-info">'
      +   '<div class="info-item"><div class="label">Clock In</div><div class="value">' + formatTime(state.todayRecord.clockIn) + '</div></div>'
      +   '<div class="info-item"><div class="label">Duration</div><div class="value" id="duration">--</div></div>'
      + '</div>';
  }

  // Big action button
  if (isClockedIn) {
    html += '<button class="btn btn-red" onclick="startClockOut()">🔴 Clock Out</button>';
  } else {
    html += '<button class="btn btn-green" onclick="goToSelfie()">🟢 Clock In Now</button>';
  }

  // Recent history
  html += '<h3 style="font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:20px;">📋 Recent History</h3>'
    + '<div id="historyList"><div class="loader"><div class="spinner"></div></div></div>';

  html += '</div>';
  appEl.innerHTML = html;

  loadHistory();
  if (isClockedIn) updateDuration();
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════

function goBack(screen) {
  state.screen = screen;
  render();
}

function goToSelfie() {
  state.screen = 'selfie';
  render();
}

// ═══ reCAPTCHA ═══
function setupRecaptcha() {
  try {
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible',
      callback: function(response) {
        console.log('reCAPTCHA verified');
      },
      'expired-callback': function() {
        showToast('reCAPTCHA expired. Please try again.', 'err');
      }
    });
  } catch(e) {
    console.warn('reCAPTCHA setup delayed');
  }
}

// ═══ Send OTP ═══
function sendOTP() {
  var phoneInp = document.getElementById('phoneInp');
  var phone = phoneInp.value.replace(/\D/g, '');
  if (phone.length !== 10) {
    showToast('Please enter a valid 10-digit phone number', 'err');
    return;
  }

  var btn = document.getElementById('sendOtpBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  state.phone = phone;

  // First check if staff exists
  db.collection('staff').where('phone', '==', phone).where('active', '==', true).get()
    .then(function(snap) {
      if (snap.empty) {
        btn.disabled = false;
        btn.textContent = '📲 Send OTP';
        showToast('This phone number is not registered. Contact your manager.', 'err');
        return;
      }

      var doc = snap.docs[0];
      state.staff = { id: doc.id, ...doc.data() };

      // Check today's record
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      return db.collection('attendance').doc(state.staff.id + '_' + todayStr).get()
        .then(function(recDoc) {
          if (recDoc.exists) state.todayRecord = recDoc.data();
          else state.todayRecord = null;

          // Send OTP
          var fullPhone = '+91' + phone;
          return auth.signInWithPhoneNumber(fullPhone, window.recaptchaVerifier);
        });
    })
    .then(function(confirmationResult) {
      if (!confirmationResult) return;
      state.confirmationCode = confirmationResult;
      state.screen = 'otp';
      render();
      showToast('OTP sent to +91 ' + phone);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '📲 Send OTP';
      console.error('OTP error:', err);
      showToast('Error: ' + (err.message || 'Failed to send OTP'), 'err');
    });
}

// ═══ OTP Input Handling ═══
function otpInput(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  if (el.value.length === 1 && idx < 6) {
    document.getElementById('o' + (idx + 1))?.focus();
  }
}

function otpKey(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 1) {
    document.getElementById('o' + (idx - 1))?.focus();
  }
}

// ═══ Verify OTP ═══
function verifyOTP() {
  var code = '';
  for (var i = 1; i <= 6; i++) {
    code += document.getElementById('o' + i)?.value || '';
  }
  if (code.length !== 6) {
    showToast('Please enter all 6 digits', 'err');
    return;
  }

  var btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.textContent = 'Verifying...';

  state.confirmationCode.confirm(code)
    .then(function(result) {
      showToast('✅ Verified! Welcome, ' + state.staff.name);
      state.screen = 'dashboard';
      render();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '✓ Verify & Continue';
      console.error('Verify error:', err);
      showToast('Invalid OTP. Please try again.', 'err');
      // Clear inputs
      for (var i = 1; i <= 6; i++) {
        var inp = document.getElementById('o' + i);
        if (inp) inp.value = '';
      }
      document.getElementById('o1')?.focus();
    });
}

// ═══ Resend OTP ═══
function resendOTP() {
  var fullPhone = '+91' + state.phone;
  auth.signInWithPhoneNumber(fullPhone, window.recaptchaVerifier)
    .then(function(confirmationResult) {
      state.confirmationCode = confirmationResult;
      showToast('OTP resent!');
    })
    .catch(function(err) {
      showToast('Error resending OTP: ' + err.message, 'err');
    });
}

// ═══ Camera ═══
var camStream = null;

function startCamera() {
  var video = document.getElementById('camVideo');
  if (!video) return;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(function(stream) {
      camStream = stream;
      video.srcObject = stream;
      video.play();
    })
    .catch(function(err) {
      console.error('Camera error:', err);
      document.getElementById('camPlaceholder').style.display = 'flex';
      showToast('Camera access denied. Enable it in settings.', 'err');
    });
}

function stopCamera() {
  if (camStream) {
    camStream.getTracks().forEach(function(t) { t.stop(); });
    camStream = null;
  }
}

// ═══ Location Check ═══
function checkLocation() {
  var geoEl = document.getElementById('geoStatus');
  if (!geoEl) return;

  if (!navigator.geolocation) {
    geoEl.className = 'geo-status geo-outside';
    geoEl.textContent = '❌ GPS not supported on this device';
    return;
  }

  geoEl.textContent = '📍 Getting your location...';

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var result = checkGeofence(pos.coords.latitude, pos.coords.longitude);
      if (result.isInside) {
        geoEl.className = 'geo-status geo-inside';
        geoEl.textContent = '✅ Inside HOD premises (' + result.distance + 'm)';
      } else {
        geoEl.className = 'geo-status geo-outside';
        geoEl.textContent = '❌ ' + result.distance + 'm away from HOD. Must be within 100m.';
        showToast('You are ' + result.distance + 'm away from HOD. Come to the venue to clock in.', 'err');
      }
    },
    function(err) {
      geoEl.className = 'geo-status geo-outside';
      geoEl.textContent = '❌ Location access denied. Enable GPS.';
      showToast('Enable location permission in your phone settings', 'err');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

// ═══ Capture Selfie ═══
function captureSelfie() {
  var video = document.getElementById('camVideo');
  if (!video || !video.videoWidth) {
    showToast('Camera not ready. Try again.', 'err');
    return;
  }

  var canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  canvas.toBlob(function(blob) {
    state.selfieBlob = blob;
    state.selfieDataUrl = canvas.toDataURL('image/jpeg', 0.85);
    stopCamera();
    state.screen = 'preview';
    render();
  }, 'image/jpeg', 0.85);
}

function retakeSelfie() {
  state.selfieBlob = null;
  state.selfieDataUrl = null;
  state.screen = 'selfie';
  render();
}

// ═══ Confirm Attendance ═══
function confirmAttendance() {
  if (!state.isInside) {
    showToast('❌ You must be inside HOD premises (within 100m) to clock in/out', 'err');
    return;
  }

  if (!state.selfieBlob) {
    showToast('Selfie is required', 'err');
    return;
  }

  var btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var now = new Date();
  var todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var docId = state.staff.id + '_' + todayStr;

  // Upload selfie
  var selfieRef = storage.ref('attendance/' + docId + '_' + Date.now() + '.jpg');
  selfieRef.put(state.selfieBlob)
    .then(function(snapshot) { return snapshot.ref.getDownloadURL(); })
    .then(function(url) {
      var isClockOut = state.todayRecord && state.todayRecord.clockIn;

      if (isClockOut) {
        // Clock Out
        return db.collection('attendance').doc(docId).update({
          clockOut: firebase.firestore.FieldValue.serverTimestamp(),
          clockOutLocation: state.location,
          clockOutDistance: state.distance,
          clockOutPhoto: url,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } else {
        // Clock In
        return db.collection('attendance').doc(docId).set({
          staffId: state.staff.id,
          staffName: state.staff.name,
          staffRole: state.staff.role,
          phone: state.staff.phone,
          date: todayStr,
          clockIn: firebase.firestore.FieldValue.serverTimestamp(),
          clockInLocation: state.location,
          clockInDistance: state.distance,
          clockInPhoto: url,
          clockOut: null,
          clockOutLocation: null,
          clockOutPhoto: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    })
    .then(function() {
      showToast(isClockOut ? '✅ Clocked Out!' : '✅ Clocked In!');
      // Refresh today's record
      return db.collection('attendance').doc(docId).get();
    })
    .then(function(doc) {
      state.todayRecord = doc.data();
      state.selfieBlob = null;
      state.selfieDataUrl = null;
      state.screen = 'dashboard';
      render();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '✓ Confirm ' + (isClockOut ? 'Clock Out' : 'Clock In');
      console.error('Save error:', err);
      showToast('Error saving: ' + err.message, 'err');
    });
}

// ═══ Start Clock Out Flow ═══
function startClockOut() {
  state.screen = 'selfie';
  render();
}

// ═══ Load History ═══
function loadHistory() {
  if (!state.staff) return;
  db.collection('attendance')
    .where('staffId', '==', state.staff.id)
    .orderBy('createdAt', 'desc')
    .limit(20)
    .get()
    .then(function(snap) {
      var html = '';
      if (snap.empty) {
        html = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:12px;">No attendance records yet</div>';
      } else {
        snap.forEach(function(doc) {
          var d = doc.data();
          var isComplete = d.clockIn && d.clockOut;
          var icon = isComplete ? '✅' : d.clockIn ? '🟢' : '⚪';
          var title = isComplete ? 'Completed' : d.clockIn ? 'In Progress' : 'Unknown';
          var sub = d.clockIn ? 'In: ' + formatTime(d.clockIn) : '';
          if (d.clockOut) sub += ' · Out: ' + formatTime(d.clockOut);

          html += '<div class="history-item">'
            +   '<span class="h-icon">' + icon + '</span>'
            +   '<div class="h-info">'
            +     '<div class="h-title">' + title + '</div>'
            +     '<div class="h-sub">' + formatDate(d.createdAt) + ' · ' + sub + '</div>'
            +   '</div>'
            + '</div>';
        });
      }
      var el = document.getElementById('historyList');
      if (el) el.innerHTML = html;
    })
    .catch(function(err) {
      console.error('History error:', err);
      var el = document.getElementById('historyList');
      if (el) el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:12px;">Could not load history</div>';
    });
}

// ═══ Duration Timer ═══
function updateDuration() {
  if (!state.todayRecord || !state.todayRecord.clockIn) return;
  var el = document.getElementById('duration');
  if (!el) return;
  var start = state.todayRecord.clockIn.toDate ? state.todayRecord.clockIn.toDate() : new Date(state.todayRecord.clockIn);
  var diff = Math.floor((Date.now() - start) / 60000);
  var h = Math.floor(diff / 60);
  var m = diff % 60;
  el.textContent = h + 'h ' + m + 'm';
}
setInterval(updateDuration, 60000);

// ═══ Init ═══
render();
console.log('✅ HOD Attendance Module loaded');
</script>
